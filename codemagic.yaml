# TradeMateAI — Codemagic iOS Build Configuration

workflows:
  ios-build:
    name: Build iOS App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 22.0.0
      xcode: 16.0
      cocoapods: default
      vars:
        APP_STORE_CONNECT_KEY_ID: $APP_STORE_CONNECT_KEY_ID
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Sync Capacitor to iOS
        script: npx @capacitor/cli sync ios
      - name: Place App Store Connect key
        script: |
          mkdir -p ~/".appstoreconnect/private_keys"
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
      - name: Build & Export
        script: |
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/ipa
    artifacts:
      - ios/App/build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
