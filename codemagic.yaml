# TradeMateAI — Codemagic iOS Build Configuration
# Docs: https://docs.codemagic.io/yaml/yaml/

workflows:
  ios-build:
    name: Build iOS App
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20.11.0
      xcode: 16.0
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Sync Capacitor to iOS
        script: |
          npx cap sync ios
      - name: Build iOS archive
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcworkspace" \
            --scheme "App" \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_ID
        submit_to_app_store: false
